<style>
  :root{
    --bg:#00090a; --accent:#10daf9;
    --chip-yellow:#fef216; --chip-yellow-text:#141300;
    --chip-red:#f40b0f; --chip-red-text:#130203;
    --green-500:#0fe745; --ink-green:#011305;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{background:var(--bg)}
  body{background:var(--bg);font-family:'Geist',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  .page{max-width:2560px;margin:0 auto;overflow-x:clip}
  /* Safari: los filtros de grano (feTurbulence/feDisplacementMap) van lentísimos; se desactivan */
  html.safari svg g[filter]{filter:none !important}
  .wrap{padding-inline:4%}
  .art{font-size:0;line-height:0}
  .art svg{display:block;width:100%;height:auto}

  .site-header{padding-top:min(4.03vw,103.2px)}
  /* criatura idéntica a la home (mismo SVG), recoloreada al acento */
  .back{display:inline-block;width:24.54%;margin-left:0.58%}
  .back svg path{fill:var(--accent)}
  .proj-title{margin-top:min(1.17vw,48px)}   /* mismo margen bajo el tigre que en la home */
  /* título: estirado al cargar, se contrae con el scroll (como la home) */
  .proj-title.squash{height:min(4.06vw,104px)}
  .proj-title.squash svg{width:100%;height:100%}
  .proj-title svg g[filter]{filter:none}

  /* cortina de transición entre páginas */
  .wipe{
    position:fixed;top:0;left:0;width:100%;height:100%;
    background:#f40b0f;transform:translateX(-101%);
    z-index:99999;pointer-events:none;
  }
  .wipe.anim{transition:transform .45s cubic-bezier(.7,0,.3,1)}
  .wipe.cover{transform:translateX(0)}
  .wipe.reveal{transform:translateX(101%)}
  .rule-8{height:min(.63vw,16px);background:var(--accent);margin-top:min(1.88vw,48px)}
  .lead{margin-top:min(2.5vw,64px);color:var(--accent);
    font-size:clamp(24px,3.91vw,100px);line-height:1.18;max-width:1500px}
  /* resaltado azul palabra a palabra al hover (igual que la Bio del home) */
  .lead .w{
    display:inline-block;
    background-image:linear-gradient(var(--accent),var(--accent));
    background-repeat:no-repeat;background-position:left center;background-size:0% 100%;
    transition:background-size .25s ease, color .2s ease .05s, transform .25s ease;
  }
  .lead .w:hover{background-size:100% 100%;color:var(--bg);transform:scale(1.22)}
  @media (pointer:fine){ body.over-bio .cursor{display:none} }

  /* marquee de 3 líneas (DIEGOALO): cada palabra se ilumina y se estira al hover,
     sin que el componente cambie de tamaño (la altura del bloque es fija) */
  .dgl-marq{margin-top:min(2.5vw,64px)}
  .mline{
    font-family:'Geist Mono',monospace;font-weight:400;
    font-size:clamp(34px,5.62vw,144px);line-height:1.1;white-space:nowrap;
    transition:transform .6s cubic-bezier(.2,.7,.2,1);
  }
  /* dirección del estirado: las dos de arriba crecen hacia abajo, la última hacia arriba */
  .mline:nth-of-type(1),.mline:nth-of-type(1) .mqw{transform-origin:top center}
  .mline:nth-of-type(2),.mline:nth-of-type(2) .mqw{transform-origin:top center}
  .mline:nth-of-type(3),.mline:nth-of-type(3) .mqw{transform-origin:bottom center}
  .mline + .mline{margin-top:min(.55vw,14px)}
  .mtrack{display:inline-block;white-space:nowrap;will-change:transform}
  /* al pasar por cualquier palabra se pausan las tres líneas */
  .dgl-marq:has(.mqw:hover) .mtrack{animation-play-state:paused}
  .mph{padding-right:1em}        /* tras una frase: más hueco para delimitarla */
  .mph.one{padding-right:.32em}  /* tras una palabra suelta: poco hueco */
  .mqw{
    display:inline-block;color:var(--accent);opacity:.4;
    transition:opacity .35s ease, transform .6s cubic-bezier(.2,.7,.2,1), color .35s ease;
  }
  /* crece solo hacia su hueco (sin llegar a la línea de al lado: no se cruzan) */
  .mqw:hover{opacity:1;transform:scaleY(1.5)}
  @media (prefers-reduced-motion: reduce){.mtrack{animation:none !important}}

  /* párrafo grande (estilo bio del home) + squash por línea al hacer scroll */
  .bigbio{
    margin-top:min(2.5vw,64px);color:var(--accent);
    font-size:clamp(48px,5.9vw,248px);line-height:1.1;max-width:1600px;
  }
  .bigbio .ilink{
    color:#0fe745;text-decoration:none;               /* ALO! en verde de primeras */
    background-image:linear-gradient(#0fe745,#0fe745);
    background-repeat:no-repeat;background-position:left center;background-size:0% 100%;
    transition:background-size .35s ease, color .25s ease .08s;
  }
  .bigbio .ilink:hover{background-size:100% 100%;color:var(--bg)}
  .bio-line{display:block;overflow:hidden}
  .bio-line-in{display:block;transform-origin:top center;will-change:transform}
  /* línea "It is a statement": destello brutalista de tipografías (cortes duros) */
  .bigbio .stmt-line{animation:stmtflash 1.6s steps(1,end) infinite}
  .bigbio .stmt-line .bio-line-in{white-space:nowrap}
  @keyframes stmtflash{
    0%{font-family:'Geist Mono',monospace;font-style:normal;letter-spacing:0}
    20%{font-family:Georgia,'Times New Roman',serif;font-style:italic}
    40%{font-family:Impact,Haettenschweiler,'Arial Narrow Bold',sans-serif;letter-spacing:.03em}
    60%{font-family:'Courier New',monospace;font-style:normal}
    80%{font-family:'Arial Black',Arial,sans-serif;letter-spacing:-.01em}
    100%{font-family:'Geist Mono',monospace;font-style:normal;letter-spacing:0}
  }
  @media (prefers-reduced-motion: reduce){ .bigbio .stmt-line{animation:none} }
  .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}

  .entry{display:block;text-decoration:none;margin-top:min(4.38vw,112px);perspective:1200px}
  .entry h2{
    font-family:'Geist Mono',monospace;font-weight:400;
    font-size:clamp(42px,7.81vw,200px);line-height:1.3;
    color:var(--accent);text-transform:uppercase;
    display:inline-block;
    background-image:linear-gradient(var(--green-500),var(--green-500));   /* bloque verde al hover */
    background-repeat:no-repeat;background-position:left center;background-size:0% 100%;
    transition:background-size .45s ease, color .25s ease, transform .22s ease-out;
  }
  /* proyectos sin link (div.entry): el bloque del título es rojo */
  div.entry h2{background-image:linear-gradient(var(--chip-red),var(--chip-red))}
  .chips{transition:transform .22s ease-out}
  @media (hover:hover) and (pointer:fine){
    .entry:hover h2{background-size:100% 100%;color:var(--bg);
      transform:translate3d(calc(var(--nx,0)*8px),calc(var(--ny,0)*6px),40px) rotateY(calc(var(--nx,0)*2.5deg)) rotateX(calc(var(--ny,0)*-2deg))}
    .entry:hover .chips{transform:translate3d(calc(var(--nx,0)*6px),calc(var(--ny,0)*4px),24px) rotateY(calc(var(--nx,0)*2.5deg)) rotateX(calc(var(--ny,0)*-2deg))}
  }
  .chips{display:flex;flex-wrap:nowrap;overflow:hidden;gap:min(1.88vw,48px);margin-top:min(1.88vw,48px)}
  .chips + .chips{margin-top:min(2.5vw,64px)}
  .chip{
    font-family:'Geist Mono',monospace;
    font-size:clamp(18px,3.13vw,80px);line-height:1.3;
    padding:0 4px;white-space:nowrap;
    background:var(--accent);color:var(--bg);
  }
  .chip.yellow{background:var(--chip-yellow);color:var(--chip-yellow-text)}
  .chip.red{background:var(--chip-red);color:var(--chip-red-text)}
  .rule-2{height:2px;background:var(--accent);margin-top:min(2.5vw,64px)}

  /* marquee automático cuando el contenido desborda (izquierda -> derecha) */
  .mq{display:block;overflow:hidden}
  .mq-track{display:inline-flex;white-space:nowrap;animation:mq linear infinite;will-change:transform}
  .mq-item{display:inline-flex;gap:min(1.88vw,48px);padding-right:0.6em}
  .chips .mq-item{padding-right:min(1.88vw,48px)}
  .gallery .mq-item{gap:min(2.73vw,70px);padding-right:min(2.73vw,70px)}
  @keyframes mq{from{transform:translateX(0)}to{transform:translateX(-50%)}}
  @media (prefers-reduced-motion: reduce){.mq-track{animation:none}}

  .gallery{display:flex;gap:min(2.73vw,70px);margin-top:min(2.5vw,64px);overflow:hidden}
  .gallery .shot{
    flex:0 0 auto;width:min(56vw,1432px);aspect-ratio:551/474;
    background-color:#06181d;background-size:cover;background-position:center;
  }
  @media (max-width:700px){ .gallery .shot{width:min(78vw,920px)} }
  .gallery.icons{gap:min(4.69vw,120px);margin-top:min(4.69vw,120px)}
  .gallery.icons .mq-item{gap:min(4.69vw,120px);padding-right:min(4.69vw,120px)}
  .gallery.icons .shot{
    width:min(31vw,794px);aspect-ratio:1/1;
    background-color:transparent;background-size:contain;background-repeat:no-repeat;
  }
  @media (max-width:700px){ .gallery.icons .shot{width:min(46vw,600px)} }

  .site-footer{margin-top:min(13.44vw,344px)}
  .footer-lockup{display:flex;justify-content:space-between;align-items:flex-start}
  .footer-left{width:49.2%}
  .f-row{display:flex;align-items:flex-start}
  .f-row-2{margin-top:min(1.72vw,44px)}
  .f-die{width:83.57%;margin-left:-0.36%}
  .f-go{width:16.43%;margin-left:0.72%}
  .f-a{width:17.51%;margin-left:-0.36%}
  .f-lo{width:82.49%;margin-left:0.36%}
  .f-creature{width:48.92%}
  .site-footer .art svg path{fill:var(--accent)}
  .footer-links{
    display:flex;justify-content:space-between;align-items:baseline;
    flex-wrap:wrap;row-gap:10px;
    margin-top:min(2.58vw,66px);
    padding-bottom:min(5.5vw,140px); /* aire justo para el popover del cursor */
    font-family:'Geist Mono',monospace;
    font-size:clamp(12px,1.88vw,48px);
  }
  .footer-links a{
    color:var(--accent);text-decoration:none;display:inline-block;
    background-image:linear-gradient(var(--accent),var(--accent));
    background-repeat:no-repeat;
    background-position:left center;
    background-size:0% 100%;
    transition:background-size .35s ease, color .25s ease .08s, transform .2s ease-out;
  }
  .footer-links a:hover{background-size:100% 100%;color:var(--bg)}
  @media (hover:hover) and (pointer:fine){
    .footer-links a:hover{transform:perspective(600px) translate3d(calc(var(--nx,0)*9px),calc(var(--ny,0)*7px),0) rotateY(calc(var(--nx,0)*8deg)) rotateX(calc(var(--ny,0)*-8deg))}
  }
  .social{display:flex;gap:min(5.4vw,138px);flex-wrap:wrap}

  /* Footer: DIEGO y ALO se estiran/comprimen al hover (solo escritorio) */
  @media (min-width:701px){
    .f-row{transition:height .35s ease}
    .f-row-1{height:min(5vw,128px)}
    .f-row-2{height:min(19.84vw,508px)}
    .f-row .art,.f-row .art svg{height:100%}
    .footer-left:has(.f-row-1:hover) .f-row-1{height:min(11vw,281.6px)}
    .footer-left:has(.f-row-1:hover) .f-row-2{height:min(13.84vw,354.4px)}
    .footer-left:has(.f-row-2:hover) .f-row-1{height:min(2.5vw,64px)}
    .footer-left:has(.f-row-2:hover) .f-row-2{height:min(22.34vw,572px)}
  }
  /* footer en móvil: letras a todo lo ancho, tigretón grande debajo,
     mail en su línea y redes debajo, más grandes */
  @media (max-width:700px){
    /* móvil: el título no se estira (altura fija, como en la home) */
    .proj-title.squash{height:min(13vw,220px)}
    /* móvil: todo más grande */
    .lead{font-size:clamp(26px,6vw,76px)}
    .entry{margin-top:min(9vw,112px)}
    .entry h2{font-size:clamp(56px,15.5vw,192px)}
    .chip{font-size:clamp(22px,5.4vw,68px)}
    .chips{gap:min(3vw,40px);margin-top:min(3vw,40px)}
    .mline{font-size:clamp(44px,10.5vw,184px)}
    .rule-8{height:6px}
    /* footer: a todo el ancho pero menos alto */
    .footer-lockup{flex-direction:column}
    .footer-left{width:100%}
    .f-row-1{height:min(8vw,160px)}
    .f-row-2{height:min(25vw,520px)}
    .f-row .art,.f-row .art svg{height:100%}
    .f-creature{width:100%;margin-top:24px}
    .footer-links{display:block;margin-top:28px;font-size:clamp(17px,5.6vw,44px);text-align:center}
    .footer-links a.mail{display:block;margin-bottom:20px}
    .social{display:flex;justify-content:space-between;width:100%;gap:12px}
  }

  /* cursor personalizado (SVG grande) + etiqueta de texto que sigue al ratón */
  .cursor,.cursor-tag{display:none}
  @media (pointer:fine){
    html,body,a,button,label,input,[data-cursor]{cursor:none}
    .cursor{display:block;position:fixed;left:-100px;top:-100px;width:min(4vw,108px);height:min(4vw,108px);border-radius:50%;background:var(--accent);mix-blend-mode:difference;pointer-events:none;z-index:10000;transform:translate(-50%,-50%);transition:background-color .25s ease}
    body.over-tag .cursor{display:none}
    .cursor-tag{position:fixed;left:-300px;top:0;pointer-events:none;z-index:10001}
    .cursor-tag .ic{position:absolute;left:0;top:0;width:min(7.5vw,208px);transform:translate(-30%,-24%)}
    .cursor-tag .ic svg{display:block;width:100%;height:auto}
    .cursor-tag .tag{
      position:absolute;left:min(3.5vw,96px);top:min(4.6vw,128px);
      background:var(--green-500);color:var(--ink-green);
      font-family:'Geist Mono',monospace;
      font-size:clamp(13px,3.13vw,80px);line-height:1.3;
      padding:0 4px;white-space:nowrap;
    }
    /* en el footer el tooltip va arriba del cursor (abajo se cortaría) */
    body.tag-up .cursor-tag .tag{top:auto;bottom:min(1.8vw,48px)}
    body.over-tag .cursor-tag{display:block}
  }
</style>
</head>

      lines = lines.concat(forced);
      el.innerHTML = lines.map(function(l){
        var cls = (l.indexOf('statement') >= 0) ? 'bio-line stmt-line' : 'bio-line';
        return '<span class="' + cls + '"><span class="bio-line-in">' + inject(l) + '</span></span>';
      }).join('');
      lineEls = [].slice.call(el.querySelectorAll('.bio-line'));
      nat = lineEls.map(function(le){ var inn = le.querySelector('.bio-line-in'); inn.style.transform = ''; le.style.height = ''; return inn.getBoundingClientRect().height; });
      cur = lineEls.map(function(){ return TO; });
    }
    function scaleFor(top, vh, FROM){
      if (reduce) return TO;
      var enter = vh, peak = vh * 0.68, end = vh * 0.14;
      if (top >= enter) return TO;                                 /* aún abajo: normal (sin CLS) */
      if (top > peak){ var p = (enter - top) / (enter - peak); return TO + (FROM - TO) * p; }
      if (top > end){ var p = (peak - top) / (peak - end); return FROM + (TO - FROM) * p; }
      return TO;
    }
    /* ESCRITORIO: altura real (sin solapes), directo al scroll */
    function updateDesktop(){
      var vh = window.innerHeight;
      for (var i = 0; i < lineEls.length; i++){
        var le = lineEls[i], inn = le.querySelector('.bio-line-in');
        var s = scaleFor(le.getBoundingClientRect().top, vh, FROM_D);
        inn.style.transform = 'scaleY(' + s.toFixed(3) + ')';
        le.style.height = (nat[i] * s).toFixed(1) + 'px';
      }
    }
    /* MÓVIL: igual que escritorio (altura real, sin solapes) pero suavizado con
       lerp para "retener" el scroll y que un scroll rápido no quede forzado */
    var rafM = null;
    function tickM(){
      var vh = window.innerHeight, moving = false;
      var tops = lineEls.map(function(le){ return le.getBoundingClientRect().top; });
      for (var i = 0; i < lineEls.length; i++){
        var tgt = scaleFor(tops[i], vh, FROM_M);
        cur[i] += (tgt - cur[i]) * 0.16;
        if (Math.abs(tgt - cur[i]) > 0.004) moving = true; else cur[i] = tgt;
      }
      for (var j = 0; j < lineEls.length; j++){
        var le = lineEls[j], inn = le.querySelector('.bio-line-in');
        inn.style.transform = 'scaleY(' + cur[j].toFixed(3) + ')';
        le.style.height = (nat[j] * cur[j]).toFixed(1) + 'px';
      }
      rafM = moving ? requestAnimationFrame(tickM) : null;
    }
    function kickM(){ if (!rafM) rafM = requestAnimationFrame(tickM); }
    function refresh(){
      mobile = window.matchMedia('(max-width:700px)').matches;
      build();
      if (reduce) return;
      if (mobile){ for (var i = 0; i < lineEls.length; i++){ var le = lineEls[i]; le.querySelector('.bio-line-in').style.transform = 'scaleY(1)'; le.style.height = nat[i].toFixed(1) + 'px'; } }
      else { updateDesktop(); }
    }
    function update(){ if (reduce) return; if (mobile) kickM(); else updateDesktop(); }
    if (document.fonts && document.fonts.ready){ document.fonts.ready.then(refresh); }
    refresh();
    return { update: update, refresh: refresh };
  }
  var items = [ setup(document.querySelector('.bigbio')) ].filter(Boolean);
  if (!items.length) return;
  var ticking = false;
  window.addEventListener('scroll', function(){ if (!ticking){ ticking = true; requestAnimationFrame(function(){ items.forEach(function(q){ q.update(); }); ticking = false; }); } }, {passive:true});
  var rt; window.addEventListener('resize', function(){ clearTimeout(rt); rt = setTimeout(function(){ items.forEach(function(q){ q.refresh(); }); }, 150); });
})();

(function(){
  /* squash del título: de 432 a 52 (unidades de diseño 1280) en los primeros ~300px de scroll */
  var title = document.querySelector('.proj-title.squash');
  var page = document.querySelector('.page');
  var reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  function squash(){
    /* en móvil no se estira: altura fija por CSS (como en la home) */
    if (document.body.classList.contains('static-title') || window.matchMedia('(max-width:700px)').matches){ if (title.style.height) title.style.height = ''; return; }
    var unit = page.clientWidth / 1280;
    var p = reduce ? 1 : Math.min(1, Math.max(0, window.scrollY / (300 * unit)));
    var hpx = ((432 + (52 - 432) * p) * unit).toFixed(1) + 'px';
    if (title.style.height !== hpx) title.style.height = hpx;
  }
  if (title){
    var tick = false;
    function onS(){ if(!tick){ tick=true; requestAnimationFrame(function(){ squash(); tick=false; }); } }
    window.addEventListener('scroll', onS, {passive:true});
    window.addEventListener('resize', onS);
    squash();
  }
})();
(function(){
  /* carrusel: las galerías siguen auto-desplazándose, pero el scroll/swipe
     horizontal las acelera (con inercia), como un carrusel */
  function carousel(el, track){
    track.style.animation = 'none';
    var reduceM = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    var setW = track.scrollWidth / 2;     /* ancho de una copia */
    var pos = 0, userV = 0, baseV = reduceM ? 0 : 55, last = 0;   /* px/seg */
    function frame(ts){
      var dt = last ? Math.min((ts - last) / 1000, 0.05) : 0.016; last = ts;
      pos -= (baseV + userV) * dt;
      userV *= Math.pow(0.9, dt * 60);
      if (Math.abs(userV) < 0.5) userV = 0;
      if (setW > 0){ while (pos <= -setW) pos += setW; while (pos > 0) pos -= setW; }
      track.style.transform = 'translateX(' + pos.toFixed(1) + 'px)';
      requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);
    /* trackpad / rueda horizontal */
    el.addEventListener('wheel', function(e){
      if (Math.abs(e.deltaX) > Math.abs(e.deltaY)){ e.preventDefault(); userV += e.deltaX * 7; }
    }, {passive:false});
    /* swipe horizontal en táctil */
    var tx = 0, ty = 0, drag = false;
    el.addEventListener('touchstart', function(e){ tx = e.touches[0].clientX; ty = e.touches[0].clientY; drag = false; }, {passive:true});
    el.addEventListener('touchmove', function(e){
      var x = e.touches[0].clientX, y = e.touches[0].clientY, dx = x - tx, dy = y - ty;
      if (!drag && Math.abs(dx) > Math.abs(dy) + 4) drag = true;
      if (drag){ e.preventDefault(); pos += dx; userV = -dx * 16; }
      tx = x; ty = y;
    }, {passive:false});
  }
  /* marquee automático para títulos y filas de chips que desbordan */
  function marquee(el){
    if (el.scrollWidth <= el.clientWidth + 2) return;
    var html = el.innerHTML;
    var w = el.scrollWidth;
    el.classList.add('mq');
    el.innerHTML = '<span class="mq-track"><span class="mq-item">'+html+'</span><span class="mq-item">'+html+'</span></span>';
    if (el.classList.contains('gallery')){ carousel(el, el.firstChild); }
    else { el.firstChild.style.animationDuration = Math.max(8, Math.round(w/110)) + 's'; }
  }
  function initMq(){
    document.querySelectorAll('.entry .chips, .entry .gallery').forEach(marquee);
  }
  if (document.fonts && document.fonts.ready){ document.fonts.ready.then(initMq); }
  else { initMq(); }

  /* parallax 3D de los títulos/tags siguiendo el cursor (solo escritorio) */
  if (window.matchMedia('(pointer:fine)').matches){
    document.querySelectorAll('.entry').forEach(function(en){
      en.addEventListener('mousemove', function(e){
        var r = en.getBoundingClientRect();
        var nx = (e.clientX - (r.left + r.width / 2)) / (r.width / 2);
        var ny = (e.clientY - (r.top + r.height / 2)) / (r.height / 2);
        en.style.setProperty('--nx', Math.max(-1, Math.min(1, nx)).toFixed(3));
        en.style.setProperty('--ny', Math.max(-1, Math.min(1, ny)).toFixed(3));
      }, {passive:true});
      en.addEventListener('mouseleave', function(){ en.style.setProperty('--nx','0'); en.style.setProperty('--ny','0'); });
    });
    /* parallax de los enlaces del footer */
    document.querySelectorAll('.footer-links a').forEach(function(el){
      el.addEventListener('mousemove', function(e){
        var r = el.getBoundingClientRect();
        var nx = (e.clientX - (r.left + r.width / 2)) / (r.width / 2);
        var ny = (e.clientY - (r.top + r.height / 2)) / (r.height / 2);
        el.style.setProperty('--nx', Math.max(-1, Math.min(1, nx)).toFixed(3));
        el.style.setProperty('--ny', Math.max(-1, Math.min(1, ny)).toFixed(3));
      }, {passive:true});
      el.addEventListener('mouseleave', function(){ el.style.setProperty('--nx','0'); el.style.setProperty('--ny','0'); });
    });
  }

  if (!window.matchMedia('(pointer:fine)').matches) return;
  var cur = document.querySelector('.cursor');
  var tag = document.querySelector('.cursor-tag');
  if (!tag) return;
  var tagText = tag.querySelector('.tag');
  window.addEventListener('mousemove', function(e){
    if (cur){ cur.style.left = e.clientX + 'px'; cur.style.top = e.clientY + 'px'; }
    tag.style.left = e.clientX + 'px'; tag.style.top = e.clientY + 'px';
  }, {passive:true});
  /* delegación: funciona también con los clones del marquee */
  document.addEventListener('mouseover', function(e){
    var el = e.target.closest ? e.target.closest('[data-cursor]') : null;
    if (!el) return;
    tagText.textContent = el.getAttribute('data-cursor');
    tagText.style.background = el.getAttribute('data-tag-bg') || '';
    tagText.style.color = el.getAttribute('data-tag-fg') || '';
    document.body.classList.add('over-tag');
    document.body.classList.toggle('tag-up', !!(el.closest && el.closest('.site-footer')));
  });
  document.addEventListener('mouseout', function(e){
    var from = e.target.closest ? e.target.closest('[data-cursor]') : null;
    if (!from) return;
    var to = (e.relatedTarget && e.relatedTarget.closest) ? e.relatedTarget.closest('[data-cursor]') : null;
    if (!to){ document.body.classList.remove('over-tag'); document.body.classList.remove('tag-up'); }
  });
})();

/* Cortina de transición: roja al volver a la home */
(function(){
  var reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  var w = document.createElement('div'); w.className = 'wipe';
  document.body.appendChild(w);
  var stored = null;
  try{ stored = sessionStorage.getItem('wipeColor'); sessionStorage.removeItem('wipeColor'); }catch(e){}
  if (stored && !reduce){
    w.style.background = stored;
    w.classList.add('cover');
    requestAnimationFrame(function(){ requestAnimationFrame(function(){
      w.classList.add('anim','reveal');
      w.classList.remove('cover');
    });});
  }
  document.querySelectorAll('a[data-wipe]').forEach(function(a){
    a.addEventListener('click', function(e){
      if (reduce) return;
      e.preventDefault();
      var color = a.getAttribute('data-wipe');
      w.style.background = color;
      try{ sessionStorage.setItem('wipeColor', color); }catch(err){}
      w.classList.remove('reveal');
      w.classList.add('anim','cover');
      setTimeout(function(){ location.href = a.href; }, 480);
    });
  });
  window.addEventListener('pageshow', function(ev){ if (ev.persisted){ w.className = 'wipe'; } });
})();

/* Scroll suave con inercia; independiente del framerate y se desactiva
   solo si el dispositivo no da la talla (vuelve al scroll nativo) */
(function(){
  if (document.documentElement.classList.contains('safari')) return;   /* nativo en Safari (el hijack va lento) */
  if (window.matchMedia('(pointer:coarse)').matches) return;
  if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
  var target = window.scrollY, current = target, raf = null, last = 0;
  var slow = 0, disabled = false;
  function maxScroll(){ return document.documentElement.scrollHeight - window.innerHeight; }
  function step(ts){
    var dt = last ? Math.min(ts - last, 100) : 16.7;
    last = ts;
    if (dt > 40){
      if (++slow > 8){ disabled = true; raf = null; window.scrollTo(0, target); return; }
    } else if (slow > 0){ slow--; }
    var k = 1 - Math.pow(0.91, dt / 16.7);
    current += (target - current) * k;
    if (Math.abs(target - current) < 0.5){ current = target; raf = null; }
    else { raf = requestAnimationFrame(step); }
    window.scrollTo(0, current);
  }
  window.addEventListener('wheel', function(e){
    if (e.ctrlKey || disabled) return;
    e.preventDefault();
    var dy = e.deltaY * (e.deltaMode === 1 ? 16 : 1);
    target = Math.max(0, Math.min(maxScroll(), target + dy));
    if (!raf){ last = 0; raf = requestAnimationFrame(step); }
  }, {passive:false});
  window.addEventListener('scroll', function(){
    if (!raf){ target = current = window.scrollY; }
  }, {passive:true});
})();
</script>
